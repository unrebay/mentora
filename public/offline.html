<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Нет связи — Mentora</title>
<meta name="theme-color" content="#06060F">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #06060F;
    color: rgba(255,255,255,0.92);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px 24px;
  }
  .logo {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 36px;
  }
  .logo em { font-style: italic; font-weight: 700; color: #6B8FFF; font-family: Georgia, serif; }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 12px; }
  p { font-size: 15px; color: rgba(255,255,255,0.55); line-height: 1.5; max-width: 320px; margin: 0 0 32px; }
  button {
    background: linear-gradient(135deg, #5575FF 0%, #4561E8 50%, #6B4FF0 100%);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 14px 36px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }
  button:active { transform: scale(0.97); }
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: -1;
    background:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 60% 70%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 90% 60%, rgba(107,143,255,0.3), transparent);
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="logo">M<em>e</em>ntora</div>
<h1>Сейчас нет связи</h1>
<p>Проверь интернет и попробуй ещё раз. Сохранённые диалоги дождутся тебя.</p>
<button onclick="location.reload()">Попробовать снова</button>
</body>
</html>
