name: Diag — proxy stream timing
# TEMPORARY diagnostic: does the Vercel egress proxy pass Anthropic SSE through
# incrementally, or buffer the whole answer? Compares direct vs proxied chunk timings.
# Delete after the streaming-buffering investigation is done.
on: workflow_dispatch

jobs:
  diag:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Compare direct vs proxy SSE chunk timing
        run: |
          python3 - <<'PY'
          import json, os, time
          import requests

          BODY = {
            "model": "claude-haiku-4-5-20251001",
            "max_tokens": 300,
            "stream": True,
            "messages": [{"role": "user", "content": "Count from 1 to 40, one number per line."}],
          }

          def probe(label, url, headers):
              t0 = time.time()
              r = requests.post(url, json=BODY, headers=headers, stream=True, timeout=60)
              print(f"[{label}] status={r.status_code} ct={r.headers.get('content-type','')[:40]}")
              n = 0; total = 0; times = []
              for chunk in r.iter_content(chunk_size=None):
                  if not chunk: continue
                  n += 1; total += len(chunk)
                  if len(times) < 60: times.append((round(time.time()-t0, 2), len(chunk)))
              spread = (times[-1][0] - times[0][0]) if times else 0
              print(f"[{label}] chunks={n} bytes={total} firstChunk={times[0][0] if times else '-'}s lastChunk={times[-1][0] if times else '-'}s spread={spread}s")
              print(f"[{label}] timeline(s:len): " + ",".join(f"{t}:{l}" for t, l in times[:40]))
              return times

          common = {"content-type": "application/json", "anthropic-version": "2023-06-01", "accept": "text/event-stream"}

          print("=== A) DIRECT api.anthropic.com (control) ===")
          probe("direct", "https://api.anthropic.com/v1/messages",
                {**common, "x-api-key": os.environ["ANTHROPIC_API_KEY"]})

          print("=== B) VIA VERCEL PROXY (ANTHROPIC_BASE_URL secret) ===")
          base = os.environ["ANTHROPIC_BASE_URL"].rstrip("/")
          probe("proxy", base + "/v1/messages",
                {**common, "x-vercel-protection-bypass": os.environ["VERCEL_BYPASS_SECRET"]})

          print("=== C) BASE_URL shape (booleans only, no secret leak) ===")
          import re
          from urllib.parse import urlparse
          h = (urlparse(base).hostname or "")
          label = h.split(".")[0]
          print("is_vercel_app:", h.endswith(".vercel.app"))
          print("subdomain_hyphen_parts:", len(label.split("-")))
          print("looks_immutable_deploy_url:", bool(re.search(r"-[a-z0-9]{8,}-", label)))
          print("matches_current_prod_label:", label == "mentora-ls7a52gn9-mentorasu")

          print("=== E) STABLE PRODUCTION DOMAIN (candidate for ANTHROPIC_BASE_URL) ===")
          probe("stable", "https://mentora-mentorasu.vercel.app/api/anthropic-proxy/v1/messages",
                {**common, "x-vercel-protection-bypass": os.environ["VERCEL_BYPASS_SECRET"]})
          PY
