name: Deploy to Russian VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to mentora.su (Russia)
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_HCAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_HCAPTCHA_SITE_KEY }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
      YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
      YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN,SUPABASE_SERVICE_ROLE_KEY,ANTHROPIC_API_KEY,OPENAI_API_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_HCAPTCHA_SITE_KEY,NEXT_PUBLIC_POSTHOG_KEY,NEXT_PUBLIC_POSTHOG_HOST,YOOKASSA_SECRET_KEY,YOOKASSA_SHOP_ID,RESEND_API_KEY,CRON_SECRET,NEXT_PUBLIC_BASE_URL,ANTHROPIC_BASE_URL,VERCEL_BYPASS_SECRET
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/mentora

            export TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
            export SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
            export ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY"
            export OPENAI_API_KEY="$OPENAI_API_KEY"
            export NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
            export NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY"
            export NEXT_PUBLIC_HCAPTCHA_SITE_KEY="$NEXT_PUBLIC_HCAPTCHA_SITE_KEY"
            export NEXT_PUBLIC_POSTHOG_KEY="$NEXT_PUBLIC_POSTHOG_KEY"
            export NEXT_PUBLIC_POSTHOG_HOST="$NEXT_PUBLIC_POSTHOG_HOST"
            export YOOKASSA_SECRET_KEY="$YOOKASSA_SECRET_KEY"
            export YOOKASSA_SHOP_ID="$YOOKASSA_SHOP_ID"
            export RESEND_API_KEY="$RESEND_API_KEY"
            export CRON_SECRET="$CRON_SECRET"
            export NEXT_PUBLIC_BASE_URL="$NEXT_PUBLIC_BASE_URL"
            export ANTHROPIC_BASE_URL="$ANTHROPIC_BASE_URL"
            export VERCEL_BYPASS_SECRET="$VERCEL_BYPASS_SECRET"

            echo "==> git fetch"
            git fetch origin main

            echo "==> clean untracked & reset to origin"
            git clean -fd
            git reset --hard origin/main

            echo "==> Write fresh .env.local (overwrite any stale VPS copy)"
            printf "%s\n" \
              "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" \
              "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" \
              "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" \
              "OPENAI_API_KEY=$OPENAI_API_KEY" \
              "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" \
              "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
              "NEXT_PUBLIC_HCAPTCHA_SITE_KEY=$NEXT_PUBLIC_HCAPTCHA_SITE_KEY" \
              "NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY" \
              "NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST" \
              "YOOKASSA_SECRET_KEY=$YOOKASSA_SECRET_KEY" \
              "YOOKASSA_SHOP_ID=$YOOKASSA_SHOP_ID" \
              "RESEND_API_KEY=$RESEND_API_KEY" \
              "CRON_SECRET=$CRON_SECRET" \
              "NEXT_PUBLIC_BASE_URL=$NEXT_PUBLIC_BASE_URL" \
              "ANTHROPIC_BASE_URL=$ANTHROPIC_BASE_URL" \
              "VERCEL_BYPASS_SECRET=$VERCEL_BYPASS_SECRET" \
              > .env.local

            echo "==> npm install"
            npm install

            echo "==> npm run build (with SWC check)"
            # If next/swc deps missing, npm install again to fetch them
            npm run build 2>&1 | tee /tmp/build_out.txt || {
              if grep -q "swc dependencies" /tmp/build_out.txt; then
                echo "==> SWC deps missing - reinstalling..."
                npm install
                npm run build
              else
                cat /tmp/build_out.txt
                exit 1
              fi
            }

            echo "==> copy assets for standalone"
            cp -r public .next/standalone/
            cp -r .next/static .next/standalone/.next/

            echo "==> pm2 restart (with updated env)"
            pm2 restart mentora --update-env || pm2 start .next/standalone/server.js --name mentora

            pm2 save
            pm2 status

            sleep 5
            curl -sf http://localhost:3000 > /dev/null && echo "✅ App is up" || (echo "❌ App health check failed"; pm2 logs mentora --lines 50 --nostream; exit 1)
