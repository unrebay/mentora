name: Build & deploy to Russian VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build on runner, ship to mentora.su
    runs-on: ubuntu-latest

    env:
      # RU-reachable Supabase reverse-proxy for BOTH browser and server so the
      # @supabase/ssr cookie storageKey (derived from the URL host) matches on
      # both sides. Splitting hosts breaks the session/PKCE cookie -> login loop.
      NEXT_PUBLIC_SUPABASE_URL: "https://sb.mentora.su"
      NEXT_PUBLIC_SUPABASE_BROWSER_URL: "https://sb.mentora.su"
      # Google Identity Services (GIS) client ID — enables the RU-friendly
      # signInWithIdToken flow (no supabase.co redirect). If unset, the auth page
      # gracefully falls back to the classic redirect Google button.
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND2_API_KEY: ${{ secrets.RESEND2_API_KEY }}
      YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
      YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
      ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_SUPPORT_BOT_TOKEN: ${{ secrets.TELEGRAM_SUPPORT_BOT_TOKEN }}
      TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js (with npm cache)
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Stamp service worker cache version (per-deploy cache-bust)
        run: sed -i "s/__BUILD_ID__/${GITHUB_SHA:0:12}/g" public/sw.js

      - name: Typecheck (tsc --noEmit) — fail deploy on type errors
        run: npx tsc --noEmit

      - name: Build (next build → standalone)
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          cp -r scripts .next/standalone/scripts

      - name: Archive bundle (tar.gz)
        run: tar -czf bundle.tar.gz -C .next/standalone .

      - name: Show bundle size
        run: ls -lh bundle.tar.gz

      - name: SCP bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: bundle.tar.gz
          target: /tmp/

      - name: Deploy on VPS (extract + pm2 restart)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_SUPPORT_BOT_TOKEN,TELEGRAM_ADMIN_CHAT_ID,SUPABASE_SERVICE_ROLE_KEY,ANTHROPIC_API_KEY,ANTHROPIC_BASE_URL,OPENAI_API_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_TURNSTILE_SITE_KEY,NEXT_PUBLIC_POSTHOG_KEY,NEXT_PUBLIC_POSTHOG_HOST,YOOKASSA_SECRET_KEY,YOOKASSA_SHOP_ID,RESEND2_API_KEY,CRON_SECRET,NEXT_PUBLIC_BASE_URL,VERCEL_BYPASS_SECRET,TELEGRAM_WEBHOOK_SECRET,INTERNAL_API_SECRET,ADMIN_SECRET
          command_timeout: 5m
          script: |
            set -e
            APP_DIR=/var/www/mentora
            # NOTE: do not mkdir/cd APP_DIR here — it may be (or become) a symlink;
            # all extraction now happens in a fresh release dir under /var/www/mentora-releases.

            # ── Zero-downtime release switch ────────────────────────────────
            # Old flow was: pm2 delete → wipe dir → extract → start. The site was
            # DOWN for the whole extraction (tens of seconds) on EVERY deploy —
            # users mid-login/mid-chat hit a dead upstream (e.g. the Google OAuth
            # callback failing right after a deploy, "State has already been used").
            # New flow: extract the new release into its own dir FIRST, then swap
            # the /var/www/mentora symlink and pm2 reload (rolling, zero-downtime).
            RELEASES=/var/www/mentora-releases
            REL="$RELEASES/r$(date +%Y%m%d%H%M%S)"
            mkdir -p "$REL"

            echo "==> Extract new standalone bundle into $REL"
            tar -xzf /tmp/bundle.tar.gz -C "$REL"
            rm -f /tmp/bundle.tar.gz

            echo "==> Write fresh .env.local"
            cat > "$REL/.env.local" <<EOF
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_SUPPORT_BOT_TOKEN=$TELEGRAM_SUPPORT_BOT_TOKEN
            TELEGRAM_ADMIN_CHAT_ID=$TELEGRAM_ADMIN_CHAT_ID
            SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            ANTHROPIC_BASE_URL=$ANTHROPIC_BASE_URL
            OPENAI_API_KEY=$OPENAI_API_KEY
            NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=$NEXT_PUBLIC_TURNSTILE_SITE_KEY
            NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
            NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
            YOOKASSA_SECRET_KEY=$YOOKASSA_SECRET_KEY
            YOOKASSA_SHOP_ID=$YOOKASSA_SHOP_ID
            RESEND2_API_KEY=$RESEND2_API_KEY
            CRON_SECRET=$CRON_SECRET
            NEXT_PUBLIC_BASE_URL=$NEXT_PUBLIC_BASE_URL
            VERCEL_BYPASS_SECRET=$VERCEL_BYPASS_SECRET
            TELEGRAM_WEBHOOK_SECRET=$TELEGRAM_WEBHOOK_SECRET
            INTERNAL_API_SECRET=$INTERNAL_API_SECRET
            ADMIN_SECRET=$ADMIN_SECRET
            EOF

            # One-time migration: /var/www/mentora used to be a real dir; turn it
            # into a symlink (this single deploy still has a brief stop window).
            if [ -e "$APP_DIR" ] && [ ! -L "$APP_DIR" ]; then
              echo "==> One-time migration: real dir -> symlink"
              pm2 delete mentora 2>/dev/null || true
              rm -rf "$APP_DIR"
            fi

            echo "==> Switch release symlink"
            ln -sfn "$REL" "$APP_DIR"
            cd "$APP_DIR"

            # HOTFIX 04.06: pm2 pins the RESOLVED realpath of server.js at start,
            # so `pm2 reload` kept running the OLD release dir — and the prune step
            # deleted it out from under the workers → MODULE_NOT_FOUND crash loop,
            # prod 500. Until a verified zero-downtime scheme is in place we do an
            # explicit delete+start from the new release (brief restart window),
            # and we prune ONLY after the health check passes (see below).
            echo "==> pm2 delete + start from new release"
            pm2 delete mentora 2>/dev/null || true
            pm2 start server.js --name mentora -i max --update-env

            echo "==> pm2 (re)start telegram-poller (long-polling, выходит наружу из VPS)"
            pm2 delete telegram-poller 2>/dev/null || true
            pm2 start scripts/telegram-poller.mjs --name telegram-poller --update-env --interpreter node

            echo "==> pm2 (re)start mentora-monitor (uptime Telegram alerts)"
            pm2 delete mentora-monitor 2>/dev/null || true
            pm2 start scripts/monitor.mjs --name mentora-monitor \
              --cron "*/2 * * * *" --no-autorestart --update-env --interpreter node

            pm2 save
            pm2 status

            echo "==> Health check"
            sleep 5
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "✅ App is up"
              echo "==> Prune old releases (keep newest 3) — only after health check"
              ls -dt "$RELEASES"/r* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
            else
              echo "❌ App health check failed"
              pm2 logs mentora --lines 80 --nostream
              exit 1
            fi
