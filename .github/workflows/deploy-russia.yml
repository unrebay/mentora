name: Deploy to Russian VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to mentora.su (Russia)
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/mentora

            echo "==> git fetch"
            git fetch origin main

            echo "==> clean untracked & reset to origin"
            git clean -fd
            git reset --hard origin/main

            echo "==> npm install"
            npm install

            echo "==> npm run build"
            npm run build

            echo "==> copy static assets for standalone mode"
            cp -r public .next/standalone/
            cp -r .next/static .next/standalone/.next/

            echo "==> pm2 restart"
            pm2 restart mentora --update-env || pm2 start .next/standalone/server.js --name mentora --update-env

            echo "==> pm2 status"
            pm2 status

            echo "==> health check"
            sleep 5
            curl -sf http://localhost:3000 > /dev/null && echo "✅ App is up" || (echo "❌ App health check failed"; pm2 logs mentora --lines 30 --nostream; exit 1)
