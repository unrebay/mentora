name: Deploy to Russian VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to mentora.su (Russia)
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_HCAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_HCAPTCHA_SITE_KEY }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN,SUPABASE_SERVICE_ROLE_KEY,ANTHROPIC_API_KEY,OPENAI_API_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_HCAPTCHA_SITE_KEY
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/mentora

            # Expose env vars so Next.js build and PM2 can use them
            export TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
            export SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
            export ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY"
            export OPENAI_API_KEY="$OPENAI_API_KEY"
            export NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
            export NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY"
            export NEXT_PUBLIC_HCAPTCHA_SITE_KEY="$NEXT_PUBLIC_HCAPTCHA_SITE_KEY"

            echo "==> git fetch"
            git fetch origin main

            echo "==> clean untracked & reset to origin"
            git clean -fd
            git reset --hard origin/main

            echo "==> npm install"
            npm install

            echo "==> npm run build"
            npm run build

            echo "==> copy assets for standalone"
            cp -r public .next/standalone/
            cp -r .next/static .next/standalone/.next/

            echo "==> pm2 restart (with updated env)"
            pm2 restart mentora --update-env || pm2 start .next/standalone/server.js --name mentora

            pm2 save

            pm2 status

            sleep 5
            curl -sf http://localhost:3000 > /dev/null && echo "✅ App is up" || (echo "❌ App health check failed"; pm2 logs mentora --lines 50 --nostream; exit 1)
