name: Certbot dry-run check

on:
  workflow_dispatch:

jobs:
  certbot-check:
    name: Check certbot auto-renewal on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Run certbot check on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=== SSL cert status ==="
            sudo certbot certificates 2>&1

            echo ""
            echo "=== Renewal config ==="
            sudo cat /etc/letsencrypt/renewal/mentora.su.conf 2>&1

            echo ""
            echo "=== certbot timer (systemd) ==="
            systemctl list-timers --all | grep -i certbot || echo "(no certbot in timers)"
            systemctl status snap.certbot.renew.timer 2>&1 | head -10 || true
            systemctl status certbot.timer 2>&1 | head -10 || true

            echo ""
            echo "=== certbot cron ==="
            crontab -l 2>&1 | grep -i certbot || echo "(no cron for current user)"
            ls /etc/cron.d/ 2>&1
            cat /etc/cron.d/certbot 2>&1 || echo "(no /etc/cron.d/certbot)"

            echo ""
            echo "=== certbot renew --dry-run ==="
            sudo certbot renew --dry-run 2>&1
