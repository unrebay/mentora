name: Factual Accuracy Benchmark

on:
  workflow_dispatch:
  push:
    branches: ['**']          # branch pushes only — NOT tag pushes (was spamming
    paths:                    # the benchmark + false "failed" emails on every safe-tag)
      - 'scripts/benchmark.mjs'

jobs:
  benchmark:
    name: Run 100-question benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/benchmark.mjs

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-${{ github.run_number }}
          path: |
            benchmark-report.md
            benchmark-results.json
          retention-days: 90
